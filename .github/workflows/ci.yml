name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cutebunny/shared db:generate
      - name: ESLint
        run: |
          pnpm --filter @cutebunny/api lint
          pnpm --filter @cutebunny/admin lint
          pnpm --filter @cutebunny/customer lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cutebunny/shared db:generate
      - run: pnpm --filter @cutebunny/shared build
      - name: Typecheck
        run: |
          pnpm --filter @cutebunny/api typecheck
          pnpm --filter @cutebunny/admin typecheck
          pnpm --filter @cutebunny/customer typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cutebunny/shared db:generate
      - name: Unit Tests
        run: pnpm --filter @cutebunny/api test

  build-admin:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cutebunny/shared db:generate
      - run: pnpm --filter @cutebunny/shared build
      - name: Build Admin
        run: pnpm --filter @cutebunny/admin build

  build-customer:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cutebunny/shared db:generate
      - run: pnpm --filter @cutebunny/shared build
      - name: Build Customer
        run: pnpm --filter @cutebunny/customer build

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Security Audit
        run: pnpm audit --audit-level=critical || true

  schema-drift-guard:
    # BUG-506: Fail CI if Prisma schema.prisma declares columns/tables
    # that are NOT covered by the migration history. Prevents deploying
    # code that references columns which don't exist in production.
    #
    # Approach: push schema.prisma into a shadow DB via `db push`, then
    # diff migration history against it. This validates that migrations
    # can produce the schema state (directional check). We use `db push`
    # instead of `migrate deploy` because some legacy migrations reference
    # tables that were created manually in Supabase (e.g. combo_sets,
    # system_configs) and those migrations fail on a fresh DB.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma
          POSTGRES_DB: drift_check
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U prisma"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://prisma:prisma@localhost:5432/drift_check
      DIRECT_URL: postgresql://prisma:prisma@localhost:5432/drift_check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cutebunny/shared db:generate
      - name: Push schema to shadow DB
        run: |
          cd packages/shared
          # First attempt will fail on uuid_generate_v4() because uuid-ossp
          # isn't loaded yet. Reset the DB to a clean state, then install
          # the extension manually, then push schema without reset.
          npx prisma db push --accept-data-loss --force-reset 2>/dev/null || true
          PGPASSWORD=prisma psql -h localhost -U prisma -d drift_check \
            -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'
          npx prisma db push --accept-data-loss
      - name: Verify schema matches datamodel
        run: |
          cd packages/shared
          npx prisma migrate diff \
            --from-url "$DATABASE_URL" \
            --to-schema-datamodel ./prisma/schema.prisma \
            --exit-code
          echo "No schema drift detected — all models/columns in schema.prisma exist in DB."

  e2e-categories-parity:
    # BUG-504-A05: Playwright parity guard between the A02 public
    # /api/v1/categories endpoint and the customer filter UI. Boots the
    # customer Next.js app via Playwright's webServer hook and asserts
    # set / order / localized-label parity on /th and /en. Protects
    # against the category-sync regression closed by A04.
    runs-on: ubuntu-latest
    needs: [build-customer]
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_API_URL: https://cutebunny-api.cutebunny-rental.workers.dev
      E2E_API_URL: https://cutebunny-api.cutebunny-rental.workers.dev
      # BUG-504-A07: admin-side parity gates (7 + 8) skip gracefully
      # when ADMIN_JWT_PROD is unset so forks/branches without access
      # to the repo secret can still run the public gates.
      E2E_ADMIN_URL: https://admin-eight-rouge.vercel.app
      ADMIN_JWT_PROD: ${{ secrets.ADMIN_JWT_PROD }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cutebunny/shared db:generate
      - run: pnpm --filter @cutebunny/shared build
      - run: pnpm --filter @cutebunny/customer build
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E parity guard
        run: pnpm test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
